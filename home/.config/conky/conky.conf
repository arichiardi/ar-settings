conky.config = {
	alignment = 'top_right',
	background = true,
	color1 = 'F9FAF9',
	color2 = '5D7B86',                          -- label_color
	color3 = '96BAC7',                          -- subtitle_color
	default_color = 'F9FAF9',
----
--  For the fluxbox blue background use:
-- 	color1 = 'FCFDFF',
--	color2 = 'A5CCEF',                          -- label_color
--	color3 = 'E0F2FF',                          -- subtitle_color
-- 	default_color = 'FCFDFF',
	cpu_avg_samples = 2,
	double_buffer = true,
	font = 'JetBrainsMono Nerd Font Mono:size=10',
	font0 = 'JetBrainsMono Nerd Font Mono:bold:size=8',
	font1 = 'JetBrainsMono Nerd Font Mono:size=16',
	font2 = 'JetBrainsMono Nerd Font Mono:size=18',
	font3 = 'JetBrainsMono Nerd Font Mono:size=20',
	font4 = 'JetBrainsMono Nerd Font Mono:size=38',
	draw_shades = false,
	gap_x = 25,
	gap_y = 13,
	minimum_width = 200,
	no_buffers = true,
	own_window = true,
	own_window_argb_value = 150,				-- real transparency - composite manager required 0-255
	own_window_argb_visual = true,				-- use ARGB - composite manager required
	own_window_type = 'normal',
	own_window_transparent = true,
	own_window_class = "conky",
	own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",
	update_interval = 1.0,
	use_xft = true,
	if_up_strictness = "address"
}
conky.text = [[
${voffset 8}${color}${font1}${time %A}$font\
${voffset -18}${alignr}${color2}${font4}${time %e}$font\
${color2}${voffset -10}${color2}${font2}${time %b}$font\
${voffset -13} ${color2}${font3}${time %Y}${font}${color2} ${voffset 2}${color}$hr

## OS
${goto -8}${color}OS${font}${alignr}${execpi 3600 awk -F= '$1=="PRETTY_NAME" { print $2 ;}' /etc/os-release | tr -d '"'}${voffset 8}
${goto -8}${color2}${font}Kernel${alignr}${color}${kernel}
${goto -8}${color2}${font}Uptime${alignr}${color}${uptime_short}

## CPU -- (first: usage | temp | power draw, second: top 3 processes)
${goto -8}${color}CPU${font}$alignr$cpu%\
${if_match ${execpi 60 sensors | grep -c 'zenpower-'} > 0} • \
${execi 5 sensors | sed -n '/zenpower-/,/^$/p' | grep 'Tctl' | awk '{gsub(/^[+-]/,"",$2); print $2}'} • \
${execi 5 sensors | sed -n '/zenpower-/,/^$/p' | grep 'SVI2_P_' | awk '{sum += $2} END {printf "%.1f W", sum}'}\
${else}\
${if_match ${execpi 60 sensors | grep -c 'coretemp' -c} > 0} • \
${execi 5 sensors | sed -n '/coretemp-/,/^$/p' | grep 'Package' | cut -d':' -f2 | awk '{gsub(/^[+-:]/,"",$1); print $1}'}
${goto -8}${color2}${top name 1}$alignr$color${top cpu 1}%
${goto -8}${color2}${top name 2}${alignr}${color}${top cpu 2}%
${goto -8}${color2}${top name 3}${alignr}${color}${top cpu 3}%

## RAM
${goto -8}${color}RAM${font}${alignr}${mem}${voffset 8}
${goto -8}${color2}${top_mem name 1}$alignr${color}${top_mem mem_res 1}
${goto -8}${color2}${top_mem name 2}$alignr${color}${top_mem mem_res 2}
${goto -8}${color2}${top_mem name 3}$alignr${color}${top_mem mem_res 3}

## SWAP
${goto -8}${color}SWAP${font}$alignr${swap}/${swapfree}
${if_match ${execpi 60 nvidia-smi -i 0 --query-gpu=memory.total --format=csv,noheader,nounits| grep -cE '^[0-9]+$'} > 0}
## GPU 0
${goto -8}${color}GPU${font}${voffset 8}
${goto -8}${color3}${execi 60 nvidia-smi -i 0 --query-gpu=gpu_name --format=csv,noheader,nounits}
${goto -8}${color2}VRAM Used$alignr${color}${execi 15 nvidia-smi -i 0 --query-gpu=memory.used --format=csv,noheader,nounits} / ${execi 60 nvidia-smi -i 0 --query-gpu=memory.total --format=csv,noheader,nounits}
${goto -8}${execbar 10 nvidia-smi -i 0 --query-gpu=memory.used,memory.total --format=csv,noheader,nounits | awk -F, 'BEGIN{p=0} $2+0>0{p=($1*100)/$2} END{printf "%.0f",p}'}
${goto -8}${color2}Temperature$alignr${color}${execi 15 nvidia-smi -i 0 --query-gpu=temperature.gpu --format=csv,noheader,nounits} °C
${goto -8}${color2}Power Draw$alignr${color}${execi 15 nvidia-smi -i 0 --query-gpu=power.draw,power.limit --format=csv,noheader,nounits | awk -F, '{printf "%s (%d) W", $1, $2}'}${endif}
${if_match ${execpi 60 nvidia-smi -i 1 --query-gpu=memory.total --format=csv,noheader,nounits| grep -cE '^[0-9]+$'} > 0}
## GPU 1
${goto -8}${color}GPU 1${font}${voffset 8}
${goto -8}${color3}${execi 60 nvidia-smi -i 1 --query-gpu=gpu_name --format=csv,noheader,nounits}
${goto -8}${color2}VRAM Used$alignr${color}${execi 15 nvidia-smi -i 1 --query-gpu=memory.used --format=csv,noheader,nounits} / ${execi 60 nvidia-smi -i 1 --query-gpu=memory.total --format=csv,noheader,nounits}
${goto -8}${execbar 10 nvidia-smi -i 1 --query-gpu=memory.used,memory.total --format=csv,noheader,nounits | awk -F, 'BEGIN{p=0} $2+0>0{p=($1*100)/$2} END{printf "%.0f",p}'}
${goto -8}${color2}Temperature$alignr${color}${execi 15 nvidia-smi -i 1 --query-gpu=temperature.gpu --format=csv,noheader,nounits} °C
${goto -8}${color2}Power Draw$alignr${color}${execi 15 nvidia-smi -i 1 --query-gpu=power.draw,power.limit --format=csv,noheader,nounits | awk -F, '{printf "%s (%d) W", $1, $2}'}${endif}
## Network
${goto -8}${color}Network${font}${voffset 8}
${goto -8}${color3}${execpi 5 bash ~/.config/conky/conky_net.sh | cut -d'|' -f1}
${goto -8}${color2}IP address${alignr}${color}${execpi 5 bash ~/.config/conky/conky_net.sh | cut -d'|' -f2}
${goto -8}${color2}Downspeed${alignr}${color}${execpi 5 bash ~/.config/conky/conky_net.sh | cut -d'|' -f3}
${goto -8}${color2}Upspeed${alignr}${color}${execpi 5 bash ~/.config/conky/conky_net.sh | cut -d'|' -f4}
]]
